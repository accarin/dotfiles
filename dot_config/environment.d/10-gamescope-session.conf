# Gamescope session config (gamescope-session-cachyos).
# Consumed by /usr/lib/steamos/gamescope-session (bash ${VAR:-default}
# expansions) and, for the HDR vars, read directly by the gamescope binary
# itself. Verified by reading that script + its commit history (github.com/
# CachyOS/gamescope-session, branch cachyos) rather than guessed.
# NOTE: environment.d changes only take effect for NEW login sessions.

# HDR for gamescope-session (Niri doesn't support HDR yet, so HDR gaming is
# done via the gamescope session instead).
ENABLE_GAMESCOPE_HDR=1
GAMESCOPE_HDR_NITS=600

# Pin a fixed display mode instead of letting gamescope/Steam re-negotiate
# resolution/refresh on every session start. This already matches
# gamescope-session's own hardcoded default ("fixed"), set explicitly here
# so it's visible/documented in one place instead of buried in
# /usr/lib/steamos/gamescope-session. Relevant to the HDR flicker
# investigation: fewer auto-negotiated modesets means fewer chances to hit
# the known DRM-atomic-modeset flicker bug (gamescope#1246 / #1593).
DRM_MODE=fixed

# NOTE on VRR/Adaptive-Sync: there is intentionally NO variable for this
# here. /usr/lib/steamos/gamescope-session does not wire --adaptive-sync
# (or any resolution/refresh flag) to an environment variable at all --
# confirmed via the script's full commit history, not guessed. VRR is
# controlled live instead: the session unconditionally exports
# STEAM_GAMESCOPE_VRR_SUPPORTED=1, which unlocks an "Allow Variable
# Refresh Rate" toggle in Steam's own in-session Quick Access Menu (drawn
# by gamescope itself, controller/keyboard-navigable -- not the monitor's
# physical OSD). Use that toggle to test disabling VRR during the HDR
# flicker investigation instead of editing this file.
